id = "integrations_agent"
display_name = "Integrations Agent"
when_to_use = "Service integration specialist — drives a SINGLE Composio toolkit per spawn (gmail, notion, github, slack, …). The `toolkit` argument is mandatory. Use when a task should be completed via a managed OAuth integration rather than raw HTTP / file I/O."
temperature = 0.4
max_iterations = 10
iteration_policy = "extended"
sandbox_mode = "none"
omit_identity = true
omit_memory_context = true
omit_safety_preamble = false
omit_skills_catalog = true

[model]
hint = "agentic"

[tools]
# Composio-only surface: this agent drives a single Composio toolkit per
# spawn. Workflow discovery/execution is the orchestrator's job now
# (`list_workflows` / `run_workflow`), so the old `workflow_load` /
# `workflow_phase` tools (removed with the `agent_workflows` domain) are gone.
named = [
    "composio_list_tools",
    "file_read",
    "composio_execute",
]
